apiVersion: polyfea.github.io/v1alpha1
kind: WebComponent
metadata:
  name: mglm-mongo-express-content
spec:
  element: iframe
  attributes:
    - name: src
      value: /mglm-mongo-express
  displayRules:
    - allOf:
        - context-name: main-content
        - path: "^(\\.?/)?mglm-mongo-express(/.*)?$"
  style:
    - name: width
      value: 100%
    - name: height
      value: 100%
