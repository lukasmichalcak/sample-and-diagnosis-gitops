apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: wac-hospital  # chceme tieto objekty umiestniť do `wac-hospital` namespace
                         # tento zapis preťaží hodnoty "namespace" vo všetkých objektoch
labels:
- pairs:
    app.kubernetes.io/part-of: wac-hospital

resources:
- ../../../apps/mglm-sample-and-diagnosis-ufe
- ../../../apps/mglm-sample-and-diagnosis-webapi
- ../../../apps/mglm-mongo-express

patches:
- path: patches/sample-and-diagnosis-webapi.service.yaml

components:
- ../../../components/version-developers
- https://github.com/lukasmichalcak/sample-and-diagnosis-webapi//deployments/kustomize/components/mongodb
